<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.C Currencies Converter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h1>A.C Currencies Converter</h1>
        <p>Convert any currency from anywhere in the world — fast & accurate</p>
    </header>

    <!-- MAIN CONVERTER -->
    <main class="converter-container">

        <!-- FROM -->
        <section class="conversion-section">
            <h2>Currency Conversion</h2>

            <div class="convert-box">

                <label>From Currency</label>
                <select id="fromCurrency"></select>

                <input type="number" id="amount" placeholder="Enter amount">

                <label>Convert To</label>
                <select id="toCurrency"></select>

                <button id="convertBtn">Convert</button>

                <div class="result-box">
                    <p id="fromText">Amount</p>
                    <h3 id="result">0.00</h3>
                    <p id="toText">Converted Amount</p>
                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 A.C Currencies Converter. All rights reserved.</p>
        <p>Powered by <strong>BMT Mobile</strong></p>
        <p>@emmpatech-empire</p>
        <p>Contact for our services: <a href="mailto:eemmpatech@gmail.com">eemmpatech@gmail.com</a></p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
